events {}

http {
    server {
        listen 3000;
        server_name _;

        # =========================
        # Access control
        # =========================

        allow 127.0.0.1;
        allow 107.98.39.128;
        allow 107.98.150.183;
        deny all;

        # =========================
        # PLM API
        # =========================

        location = /plmapi/broker.do {
            proxy_pass http://splm.sec.samsung.net/plmapi/broker.do;

            proxy_set_header Host splm.sec.samsung.net;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # =========================
        # File download API
        # =========================

        location = /fileapi/getFile.do {
            proxy_pass http://splm.sec.samsung.net/fileapi/getFile.do;

            proxy_set_header Host splm.sec.samsung.net;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # =========================
        # File upload API
        # =========================

        location = /fileapi/createPLMDocument.do {
            proxy_pass http://splm.sec.samsung.net/fileapi/createPLMDocument.do;

            proxy_set_header Host splm.sec.samsung.net;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Allow larger uploads if needed
            client_max_body_size 200M;
        }

        # =========================
        # Block everything else
        # =========================

        location / {
            return 403;
        }
    }
}
