# =========================
# Squid custom ACL config
# =========================

# Allow specific client
acl allowed_client src 107.98.39.128/32
acl allowed_client src 107.98.68.201/32

# Safe ports (basic protection)
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 1025-65535

# SSL CONNECT ports
acl SSL_ports port 443

# =========================
# Access rules (ORDER MATTERS)
# =========================

# Deny unsafe ports
http_access deny !Safe_ports

# Deny unsafe CONNECT
http_access deny CONNECT !SSL_ports

# Allow local machine
http_access allow localhost

# Allow your remote client
http_access allow allowed_client

# Deny everything else
http_access deny all
