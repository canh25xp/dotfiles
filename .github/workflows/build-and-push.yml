name: Build and Push

on:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths:
      - "Dockerfile"
      - "home/**"
      - ".github/workflows/build-and-push.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - "home/**"
      - ".github/workflows/build-and-push.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        target:
          - name: full
            flavor: latest
          - name: minimal
            flavor: minimal

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/canh25xp/dotfiles-debian
          tags: |
            type=raw,value=${{ matrix.target.flavor }},enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},prefix=${{ matrix.target.name == 'full' && 'v' || format('{0}-', matrix.target.flavor) }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: DOTFILES_SHA=${{ github.sha }}
          target: ${{ matrix.target.name }}

      - name: Test image
        if: ${{ github.ref == 'refs/heads/main' && matrix.target.name == 'full' }}
        run: |
          docker run --rm \
            ghcr.io/${{ github.repository_owner }}/dotfiles-debian:latest \
            chezmoi status --no-tty
