name: Build and Push

on:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths:
      - "Dockerfile"
      - "home/**"
      - ".github/workflows/build-and-push.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - "home/**"
      - ".github/workflows/build-and-push.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (PR)
        if: ${{ github.event_name == 'pull_request' }}
        uses: docker/build-push-action@v6
        with:
          push: false

      - name: Build and push (latest)
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/canh25xp/dotfiles-debian:latest

      - name: Test image
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          docker run --rm \
            ghcr.io/${{ github.repository_owner }}/dotfiles-debian:latest \
            chezmoi status --no-tty

      - name: Build and push version tag
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/canh25xp/dotfiles-debian:${{ github.ref_name }}
